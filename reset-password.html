<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重置密码 · CP 热力榜</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .reset-container {
            max-width: 400px;
            margin: 60px auto 0;
            padding: 0 20px;
        }
        .reset-container h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .reset-container .subtitle {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .reset-container .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 12px;
            margin-top: 8px;
        }
        .reset-container .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 14px;
        }
        .reset-container .back-link a {
            color: #6c5ce7;
        }
        .reset-container .code-row {
            display: flex;
            gap: 10px;
        }
        .reset-container .code-row input {
            flex: 1;
        }
        .reset-container .code-row .btn-secondary {
            white-space: nowrap;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .step-indicator .step {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            background: #e5e7eb;
            color: #9ca3af;
            transition: all 0.3s;
        }
        .step-indicator .step.active {
            background: #6c5ce7;
            color: #fff;
        }
        .step-indicator .step.done {
            background: #d1fae5;
            color: #065f46;
        }
        .step-indicator .line {
            width: 24px;
            height: 2px;
            background: #e5e7eb;
            align-self: center;
        }
        .step-indicator .line.done {
            background: #6c5ce7;
        }
        .form-step {
            display: none;
        }
        .form-step.active {
            display: block;
        }
        .form-step .form-group {
            margin-bottom: 16px;
        }
        .form-step .form-group label {
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-bottom: 4px;
        }
        .form-step .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        .form-step .form-group input:focus {
            border-color: #6c5ce7;
        }
        .success-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="reset-container">
        <h2>🔑 重置密码</h2>
        <p class="subtitle" id="stepSubtitle">验证身份，重新设置你的登录密码</p>

        <!-- 步骤指示器 -->
        <div class="step-indicator">
            <span class="step active" id="step1">1</span>
            <span class="line" id="line1"></span>
            <span class="step" id="step2">2</span>
            <span class="line" id="line2"></span>
            <span class="step" id="step3">3</span>
        </div>

        <!-- ===== 步骤1：输入邮箱 ===== -->
        <div class="form-step active" id="stepForm1">
            <div class="form-group">
                <label>📧 注册邮箱</label>
                <input type="email" id="emailInput" placeholder="请输入你的注册邮箱" />
            </div>
            <button class="btn-primary" id="sendCodeBtn">发送验证码</button>
            <p style="text-align:center;margin-top:12px;font-size:13px;color:#9ca3af;">
                验证码将发送到你的邮箱
            </p>
        </div>

        <!-- ===== 步骤2：输入验证码 ===== -->
        <div class="form-step" id="stepForm2">
            <div class="form-group">
                <label>📨 验证码</label>
                <div class="code-row">
                    <input type="text" id="codeInput" placeholder="请输入6位验证码" maxlength="8" />
                    <button class="btn-secondary" id="resendCodeBtn">重新发送</button>
                </div>
            </div>
            <button class="btn-primary" id="verifyCodeBtn">验证并继续</button>
            <p style="text-align:center;margin-top:12px;font-size:13px;color:#9ca3af;">
                验证码有效期 5 分钟
            </p>
        </div>

        <!-- ===== 步骤3：设置新密码 ===== -->
        <div class="form-step" id="stepForm3">
            <div class="form-group">
                <label>🔒 新密码</label>
                <input type="password" id="newPasswordInput" placeholder="至少6位" />
            </div>
            <div class="form-group">
                <label>✅ 确认新密码</label>
                <input type="password" id="confirmPasswordInput" placeholder="再次输入新密码" />
            </div>
            <button class="btn-primary" id="resetPasswordBtn">重置密码</button>
        </div>

        <!-- ===== 步骤4：完成 ===== -->
        <div class="form-step" id="stepForm4">
            <div class="success-icon">🎉</div>
            <h3 style="text-align:center;color:#1a1a2e;">密码重置成功！</h3>
            <p style="text-align:center;color:#9ca3af;margin-top:8px;">你现在可以使用新密码登录了</p>
            <a href="login.html" class="btn-primary" style="display:block;text-align:center;margin-top:20px;text-decoration:none;">去登录</a>
        </div>

        <p class="back-link"><a href="login.html">← 返回登录</a></p>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/supabase.js"></script>
    <script>
        // ============================================================
        // 状态管理
        // ============================================================
        var currentStep = 1;
        var verifiedEmail = '';
        var countdown = 0;
        var countdownTimer = null;

        // ============================================================
        // UI 控制
        // ============================================================
        function showStep(step) {
            // 隐藏所有步骤
            document.querySelectorAll('.form-step').forEach(function(el) {
                el.classList.remove('active');
            });

            // 显示当前步骤
            var stepEl = document.getElementById('stepForm' + step);
            if (stepEl) stepEl.classList.add('active');

            // 更新步骤指示器
            for (var i = 1; i <= 3; i++) {
                var indicator = document.getElementById('step' + i);
                var line = document.getElementById('line' + i);
                if (indicator) {
                    indicator.classList.remove('active', 'done');
                    if (i < step) indicator.classList.add('done');
                    else if (i === step) indicator.classList.add('active');
                }
                if (line) {
                    line.classList.toggle('done', i < step);
                }
            }

            // 更新副标题
            var subtitles = {
                1: '验证身份，重新设置你的登录密码',
                2: '请输入邮箱收到的验证码',
                3: '设置你的新登录密码'
            };
            document.getElementById('stepSubtitle').textContent = subtitles[step] || '';

            currentStep = step;
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            if (!t) { alert(msg); return; }
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._hideTimer);
            t._hideTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

        // ============================================================
        // 步骤1：发送验证码
        // ============================================================
        document.getElementById('sendCodeBtn').addEventListener('click', async function() {
            var email = document.getElementById('emailInput').value.trim();

            if (!email || !email.includes('@')) {
                showToast('请输入正确的邮箱地址');
                return;
            }

            this.disabled = true;
            this.textContent = '发送中...';

            try {
                var client = getClient();

                // 检查邮箱是否已注册
                var { data: userData, error: userError } = await client
                    .from('users')
                    .select('id')
                    .eq('email', email)
                    .maybeSingle();

                if (userError || !userData) {
                    showToast('该邮箱未注册，请先注册');
                    this.disabled = false;
                    this.textContent = '发送验证码';
                    return;
                }

                // 发送验证码（使用 signInWithOtp）
                var { error } = await client.auth.signInWithOtp({
                    email: email,
                    options: {
                        shouldCreateUser: false
                    }
                });

                if (error) throw error;

                verifiedEmail = email;
                showToast('📨 验证码已发送到你的邮箱');

                // 切换到步骤2
                showStep(2);

                // 启动倒计时
                countdown = 60;
                var resendBtn = document.getElementById('resendCodeBtn');
                resendBtn.disabled = true;
                resendBtn.textContent = countdown + 's';

                clearInterval(countdownTimer);
                countdownTimer = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(countdownTimer);
                        resendBtn.disabled = false;
                        resendBtn.textContent = '重新发送';
                    } else {
                        resendBtn.textContent = countdown + 's';
                    }
                }, 1000);

            } catch (err) {
                console.error('发送验证码失败:', err);
                showToast('发送失败，请重试');
            } finally {
                this.disabled = false;
                this.textContent = '发送验证码';
            }
        });

        // ============================================================
        // 重新发送验证码
        // ============================================================
        document.getElementById('resendCodeBtn').addEventListener('click', async function() {
            if (!verifiedEmail) {
                showToast('请重新输入邮箱');
                showStep(1);
                return;
            }

            this.disabled = true;
            this.textContent = '发送中...';

            try {
                var client = getClient();
                var { error } = await client.auth.signInWithOtp({
                    email: verifiedEmail,
                    options: {
                        shouldCreateUser: false
                    }
                });

                if (error) throw error;

                showToast('📨 验证码已重新发送');

                // 重置倒计时
                countdown = 60;
                this.disabled = true;
                this.textContent = countdown + 's';

                clearInterval(countdownTimer);
                countdownTimer = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(countdownTimer);
                        document.getElementById('resendCodeBtn').disabled = false;
                        document.getElementById('resendCodeBtn').textContent = '重新发送';
                    } else {
                        document.getElementById('resendCodeBtn').textContent = countdown + 's';
                    }
                }, 1000);

            } catch (err) {
                console.error('重新发送失败:', err);
                showToast('发送失败，请重试');
                this.disabled = false;
                this.textContent = '重新发送';
            }
        });

        // ============================================================
        // 步骤2：验证验证码
        // ============================================================
        document.getElementById('verifyCodeBtn').addEventListener('click', async function() {
            var code = document.getElementById('codeInput').value.trim();

            if (!code || code.length < 4) {
                showToast('请输入完整的验证码');
                return;
            }

            if (!verifiedEmail) {
                showToast('请重新获取验证码');
                showStep(1);
                return;
            }

            this.disabled = true;
            this.textContent = '验证中...';

            try {
                var client = getClient();

                // 验证验证码
                var { data, error } = await client.auth.verifyOtp({
                    email: verifiedEmail,
                    token: code,
                    type: 'email'
                });

                if (error) throw error;

                if (data && data.user) {
                    // 验证成功，进入步骤3
                    showToast('✅ 验证成功，请设置新密码');
                    showStep(3);

                    // 聚焦到密码输入框
                    document.getElementById('newPasswordInput').focus();
                } else {
                    showToast('验证码错误或已过期，请重新获取');
                }

            } catch (err) {
                console.error('验证失败:', err);
                showToast('验证码错误或已过期');
            } finally {
                this.disabled = false;
                this.textContent = '验证并继续';
            }
        });

        // ============================================================
        // 步骤3：重置密码
        // ============================================================
        document.getElementById('resetPasswordBtn').addEventListener('click', async function() {
            var newPwd = document.getElementById('newPasswordInput').value.trim();
            var confirmPwd = document.getElementById('confirmPasswordInput').value.trim();

            if (!newPwd || newPwd.length < 6) {
                showToast('密码至少6位');
                return;
            }
            if (newPwd !== confirmPwd) {
                showToast('两次密码不一致');
                return;
            }

            this.disabled = true;
            this.textContent = '重置中...';

            try {
                var client = getClient();

                // 更新密码
                var { error } = await client.auth.updateUser({
                    password: newPwd
                });

                if (error) throw error;

                // 更新 users 表的 has_password 字段
                var { data: userData } = await client
                    .from('users')
                    .select('id')
                    .eq('email', verifiedEmail)
                    .maybeSingle();

                if (userData) {
                    await client
                        .from('users')
                        .update({ has_password: true })
                        .eq('id', userData.id);
                }

                showToast('✅ 密码重置成功！');
                showStep(4);

            } catch (err) {
                console.error('重置密码失败:', err);
                showToast('重置失败，请重试');
            } finally {
                this.disabled = false;
                this.textContent = '重置密码';
            }
        });

        // ============================================================
        // 回车键支持
        // ============================================================
        document.getElementById('emailInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('sendCodeBtn').click();
        });

        document.getElementById('codeInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('verifyCodeBtn').click();
        });

        document.getElementById('confirmPasswordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('resetPasswordBtn').click();
        });

        // ============================================================
        // 初始化
        // ============================================================
        showStep(1);
        console.log('✅ 重置密码页面已加载');
    </script>
</body>
</html>
