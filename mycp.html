<!DOCTYPE html>

<head>

        .comment-item {

        .reply-input-area input {

        }
        .avatar-color-0 { background: #6c5ce7; }
        .avatar-color-1 { background: #e74c3c; }
        .avatar-color-2 { background: #2ecc71; }
        .avatar-color-3 { background: #f39c12; }
        .avatar-color-4 { background: #3498db; }
        .avatar-color-5 { background: #1abc9c; }
        .avatar-color-6 { background: #e67e22; }
        .avatar-color-7 { background: #9b59b6; }
        .feature-section {
            background: #fff;

        .feature-header {

        .style-tag,

        .complaint-item {

        }
        .complaint-item .complaint-content {

        }
        .complaint-item .complaint-actions {
            display: flex;

        }
        .complaint-item .complaint-actions button {

        .complaint-input-row {

        .complaint-input-row input {

            padding: 8px 12px;
            border: 1px solid #e5e7eb;

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);

            padding: 10px 24px;

</head>
<body>

    <div class="header">
        <h1 id="detailTitle">💬 CP 讨论</h1>
        <a href="javascript:history.back()" class="btn-secondary">← 返回</a>
    </div>

    <div id="detailBody">
        <div class="loading-state">加载中...</div>
    </div>

    <div class="comment-input-area" id="commentInputArea" style="display:none;">
        <span class="user-badge" id="userBadge">👤 游客</span>
        <input type="text" id="commentContent" placeholder="写评论..." style="flex:1;" />
        <button class="send-btn" id="sendCommentBtn">发送</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // 工具函数
        // ============================================================
        function showToast(msg) {
            var t = document.getElementById('toast');
            if (!t) { alert(msg); return; }
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._hideTimer);
            t._hideTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(iso) {
            if (!iso) return '';
            var d = new Date(iso);
            return d.getMonth() + 1 + '/' + d.getDate() + ' ' +
                String(d.getHours()).padStart(2, '0') + ':' +
                String(d.getMinutes()).padStart(2, '0');
        }

        function getAvatarColor(seed) {
            var colors = ['avatar-color-0', 'avatar-color-1', 'avatar-color-2', 'avatar-color-3',
                'avatar-color-4', 'avatar-color-5', 'avatar-color-6', 'avatar-color-7'
            ];
            var hash = 0;
            for (var i = 0; i < seed.length; i++) {
                hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function getInitials(name) {
            if (!name) return '?';
            return name.substr(0, 1).toUpperCase();
        }

        function getCpIdFromUrl() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (id && !isNaN(id)) return parseInt(id);
            var pathParts = window.location.pathname.split('/');
            for (var i = pathParts.length - 1; i >= 0; i--) {
                if (pathParts[i] && !isNaN(pathParts[i])) {
                    return parseInt(pathParts[i]);
                }
            }
            return null;
        }

        function getUserInfo() {
            var user = getCurrentUser();
            if (user) {
                return { id: user.id, email: user.email, isGuest: false };
            }
            return { id: 'guest_' + Date.now(), email: null, isGuest: true };
        }

        async function getUserNickname(userId) {
            if (!userId || userId.startsWith('guest_')) return null;
            try {
                var client = getClient();
                var { data, error } = await client
                    .from('users')
                    .select('nickname')
                    .eq('id', userId)
                    .maybeSingle();
                if (error || !data) return null;
                return data.nickname;
            } catch (e) {
                return null;
            }
        }

        function getDaysSince(dateStr) {
            var created = new Date(dateStr);
            var now = new Date();
            var diff = now - created;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        // ============================================================
        // 主逻辑
        // ============================================================
        var myDeviceId = getDeviceId();
        var cpId = getCpIdFromUrl();
        var currentUser = getUserInfo();

        console.log('当前 CP ID:', cpId);

        var body = document.getElementById('detailBody');
        var commentArea = document.getElementById('commentInputArea');

        if (!cpId) {
            body.innerHTML = '<div class="error-state">❌ 参数错误，请从首页进入</div>';
            commentArea.style.display = 'none';
        } else {
            loadDetail(cpId);
        }

        async function loadDetail(cpId) {
            try {
                var client = getClient();

                var { data: cpData, error: cpError } = await client
                    .from('cp_submissions')
                    .select('id, male_actor, female_actor, genre, status, flower_count, egg_count, submit_time, votes ( id )')
                    .eq('id', cpId)
                    .maybeSingle();

                if (cpError || !cpData) {
                    console.error('CP 不存在:', cpError);
                    body.innerHTML = '<div class="error-state">❌ CP 不存在或已被删除</div>';
                    commentArea.style.display = 'none';
                    return;
                }

                var voteCount = cpData.votes ? cpData.votes.length : 0;
                var flowerCount = cpData.flower_count || 0;
                var eggCount = cpData.egg_count || 0;

                var { data: comments, error: commentError } = await client
                    .from('comments')
                    .select('id, user_id, nickname, content, created_at, device_id, parent_id')
                    .eq('submission_id', cpId)
                    .order('created_at', { ascending: false });

                if (commentError) {
                    console.warn('加载评论失败:', commentError);
                    comments = [];
                }

                var { data: reasons, error: reasonsError } = await client
                    .from('cp_reasons')
                    .select('id, user_id, reason, like_count, created_at, device_id')
                    .eq('submission_id', cpId)
                    .order('created_at', { ascending: false })
                    .limit(10);

                if (reasonsError) {
                    console.warn('加载粉丝心声失败:', reasonsError);
                    reasons = [];
                }

                var title = cpData.male_actor + ' ✕ ' + cpData.female_actor;
                document.getElementById('detailTitle').textContent = '💬 ' + title;
                updateUserBadge();

                var topComments = [];
                var replyMap = {};
                comments.forEach(function(c) {
                    if (c.parent_id) {
                        if (!replyMap[c.parent_id]) replyMap[c.parent_id] = [];
                        replyMap[c.parent_id].push(c);
                    } else {
                        topComments.push(c);
                    }
                });

                var commentHtml = '';
                if (topComments.length === 0) {
                    commentHtml = '<div class="comment-empty">还没有评论，来说点什么吧 💬</div>';
                } else {
                    topComments.forEach(function(c) {
                        commentHtml += renderComment(c, replyMap);
                    });
                }

                var reasonHtml = '';
                if (reasons && reasons.length > 0) {
                    reasonHtml = `
                        <div class="reason-section">
                            <div class="reason-title">💬 粉丝心声</div>
                            ${reasons.map(function(r) {
                                var displayName = '用户';
                                var timeStr = formatTime(r.created_at);
                                return `
                                    <div class="reason-item">
                                        <div class="reason-author">${escapeHtml(displayName)} <span style="font-weight:400;color:#9ca3af;font-size:11px;">· ${timeStr}</span></div>
                                        <div class="reason-text">“${escapeHtml(r.reason)}”</div>
                                        ${r.like_count > 0 ? `<div class="reason-like">❤️ ${r.like_count}</div>` : ''}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                } else {
                    reasonHtml = `
                        <div class="reason-section">
                            <div class="reason-title">💬 粉丝心声</div>
                            <div class="reason-empty">还没有粉丝分享理由，快来成为第一个吧 🌟</div>
                        </div>
                    `;
                }

                body.innerHTML = `
                    <div class="cp-summary">
                        <div class="cp-title">${escapeHtml(cpData.male_actor)} ✕ ${escapeHtml(cpData.female_actor)}</div>
                        <div class="cp-meta">
                            <span class="genre-tag">${escapeHtml(cpData.genre)}</span>
                            <span>❤️ ${voteCount} 票</span>
                            <span>🌹 ${flowerCount}</span>
                            <span>🥚 ${eggCount}</span>
                            <span class="status-tag">${cpData.status === 'approved' ? '✅ 已上线' : '⏳ 审核中'}</span>
                        </div>
                        ${reasonHtml}
                    </div>

                    <!-- 风格标签 -->
                    <div class="feature-section" id="styleSection">
                        <div class="feature-header">
                            <span class="feature-icon">🎨</span>
                            <span class="feature-title">你觉得这对CP适合什么风格？</span>
                            <span class="feature-hint">（点击选择，可多选）</span>
                        </div>
                        <div class="tag-group" id="styleTags">
                            <button class="style-tag" data-tag="古风">🏮 古风</button>
                            <button class="style-tag" data-tag="现代">🏙️ 现代</button>
                            <button class="style-tag" data-tag="悬疑">🔍 悬疑</button>
                            <button class="style-tag" data-tag="甜宠">🍬 甜宠</button>
                            <button class="style-tag" data-tag="暗黑">🌑 暗黑</button>
                            <button class="style-tag" data-tag="喜剧">😂 喜剧</button>
                        </div>
                        <div id="styleResult" style="font-size:13px;color:#6b7280;margin-top:8px;">加载中...</div>
                    </div>

                    <!-- 雷区 -->
                    <div class="feature-section" id="avoidSection">
                        <div class="feature-header">
                            <span class="feature-icon">🚫</span>

        // ============================================================
        // 渲染评论
        // ============================================================
        function renderComment(comment, replyMap) {
            var isGuest = !comment.user_id || comment.user_id.startsWith('guest_');
            var displayName = comment.nickname || (isGuest ? '游客' : '用户');
            var avatarSeed = comment.user_id || comment.nickname || 'guest';
            var avatarColor = getAvatarColor(avatarSeed);
            var initials = getInitials(displayName);
            var timeStr = formatTime(comment.created_at);

            var replies = replyMap[comment.id] || [];
            var replyHtml = '';
            if (replies.length > 0) {
                replyHtml = '<div class="replies">';
                replies.forEach(function(r) {
                    var rIsGuest = !r.user_id || r.user_id.startsWith('guest_');
                    var rName = r.nickname || (rIsGuest ? '游客' : '用户');
                    var rColor = getAvatarColor(r.user_id || r.nickname || 'guest');
                    var rInitials = getInitials(rName);
                    replyHtml += `
                        <div class="reply-item">
                            <div class="comment-header">
                                <span class="comment-avatar ${rColor}">${rInitials}</span>
                                <span class="comment-nickname">${escapeHtml(rName)}</span>
                                <span class="comment-time">${formatTime(r.created_at)}</span>
                            </div>
                            <div class="comment-content">${escapeHtml(r.content)}</div>
                        </div>
                    `;
                });
                replyHtml += '</div>';
            }

            return `
                <div class="comment-item" id="comment_${comment.id}">
                    <div class="comment-header">
                        <span class="comment-avatar ${avatarColor}">${initials}</span>
                        <span class="comment-nickname">${escapeHtml(displayName)}${isGuest ? ' <span class="guest-tag">🧳 游客</span>' : ''}</span>
                        <span class="comment-time">${timeStr}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    <div class="comment-actions">
                        <button class="reply-btn" data-parent-id="${comment.id}">💬 回复</button>
                    </div>
                    ${replyHtml}
                    <div class="reply-input-area" id="reply_area_${comment.id}" style="display:none;">
                        <input type="text" id="reply_input_${comment.id}" placeholder="回复 ${escapeHtml(displayName)}..." style="flex:1;" />
                        <button class="reply-send-btn" data-parent-id="${comment.id}">发送</button>
                    </div>
                </div>
            `;
        }

        function toggleReplyInput(parentId) {
            var area = document.getElementById('reply_area_' + parentId);
            if (area) {
                if (area.style.display === 'none' || area.style.display === '') {
                    area.style.display = 'flex';
                    var input = document.getElementById('reply_input_' + parentId);
                    if (input) input.focus();
                } else {
                    area.style.display = 'none';
                }
            }
        }

        function updateUserBadge() {
            var badge = document.getElementById('userBadge');
            if (!badge) return;
            var user = getCurrentUser();
            if (user) {
                getUserNickname(user.id).then(function(nickname) {
                    var display = nickname || user.email || '用户';
                    badge.textContent = '👤 ' + display;
                });
                badge.textContent = '👤 ' + (user.email || '用户');
            } else {
                badge.textContent = '🧳 游客';
            }
        }

        // ============================================================
        // 发送评论 / 回复
        // ============================================================
        async function handleSendComment(cpId, parentId, prefillContent) {
            var contentInput = document.getElementById('commentContent');
            var content = prefillContent || contentInput.value.trim();

            if (!content) { showToast('请输入评论内容'); return; }

            var user = getCurrentUser();
            var isGuest = !user;

            var nickname = null;
            if (!isGuest) {
                try {
                    var client = getClient();
                    var { data } = await client
                        .from('users')
                        .select('nickname')
                        .eq('id', user.id)
                        .maybeSingle();
                    if (data && data.nickname) {
                        nickname = data.nickname;
                    } else {
                        nickname = user.email ? user.email.split('@')[0] : '用户';
                    }
                } catch (e) {
                    nickname = user.email ? user.email.split('@')[0] : '用户';
                }
            } else {
                nickname = '游客_' + Math.random().toString(36).substr(2, 4);
            }

            try {
                var client = getClient();
                var { error } = await client.from('comments').insert({
                    submission_id: cpId,
                    user_id: isGuest ? null : String(user.id),
                    device_id: isGuest ? myDeviceId : String(user.id),
                    nickname: nickname,
                    content: content,
                    parent_id: parentId || null
                });

                if (error) throw error;

                showToast(parentId ? '回复成功 ✅' : '评论发送成功 ✅');
                if (!prefillContent) {
                    contentInput.value = '';
                }
                loadDetail(cpId);

            } catch (err) {
                console.error('发送失败:', err);
                showToast('发送失败，请重试');
            }
        }

        // ============================================================
        // 风格标签和雷区函数
        // ============================================================
        var selectedStyleTags = [];

        async function loadStylesAndAvoids(cpId) {
            try {
                var client = getClient();
                var user = getCurrentUser();
                var deviceId = user ? user.id : myDeviceId;

                var { data: styles, error: sError } = await client
                    .from('cp_styles')
                    .select('style_tag')
                    .eq('cp_id', cpId)
                    .eq('device_id', deviceId);

                if (!sError && styles) {
                    var selectedStyles = styles.map(function(s) { return s.style_tag; });
                    document.querySelectorAll('.style-tag').forEach(function(btn) {
                        if (selectedStyles.indexOf(btn.getAttribute('data-tag')) !== -1) {
                            btn.classList.add('active');
                        }
                        btn.onclick = function() {
                            toggleStyle(cpId, this);
                        };
                    });
                } else {
                    document.querySelectorAll('.style-tag').forEach(function(btn) {
                        btn.onclick = function() {
                            toggleStyle(cpId, this);
                        };
                    });
                }

                var { data: avoids, error: aError } = await client
                    .from('cp_avoids')
                    .select('avoid_tag')
                    .eq('cp_id', cpId)
                    .eq('device_id', deviceId);

                if (!aError && avoids) {
                    var selectedAvoids = avoids.map(function(a) { return a.avoid_tag; });
                    document.querySelectorAll('.avoid-tag').forEach(function(btn) {
                        if (selectedAvoids.indexOf(btn.getAttribute('data-tag')) !== -1) {
                            btn.classList.add('active');
                        }
                        btn.onclick = function() {
                            toggleAvoid(cpId, this);
                        };
                    });
                } else {
                    document.querySelectorAll('.avoid-tag').forEach(function(btn) {
                        btn.onclick = function() {
                            toggleAvoid(cpId, this);
                        };
                    });
                }

                updateStyleDisplay(cpId);
                updateAvoidDisplay(cpId);

            } catch (err) {
                console.warn('加载风格/雷区失败:', err);
            }
        }

        async function toggleStyle(cpId, btn) {
            var user = getCurrentUser();
            if (!user) {
                showToast('请先登录 🚀');
                window.location.href = 'login.html';
                return;
            }

            var tag = btn.getAttribute('data-tag');
            var client = getClient();
            var deviceId = user.id;

            if (btn.classList.contains('active')) {
                btn.classList.remove('active');
                await client
                    .from('cp_styles')
                    .delete()
                    .eq('cp_id', cpId)
                    .eq('device_id', deviceId)
                    .eq('style_tag', tag);
                showToast('已取消 "' + tag + '" 风格');
            } else {
                btn.classList.add('active');
                await client
                    .from('cp_styles')
                    .insert({
                        cp_id: cpId,
                        user_id: user.id,
                        device_id: deviceId,
                        style_tag: tag
                    });
                showToast('已添加 "' + tag + '" 风格 🎨');
            }

            updateStyleDisplay(cpId);
        }

        async function toggleAvoid(cpId, btn) {
            var user = getCurrentUser();
            if (!user) {
                showToast('请先登录 🚀');
                window.location.href = 'login.html';
                return;
            }

            var tag = btn.getAttribute('data-tag');
            var client = getClient();
            var deviceId = user.id;

            if (btn.classList.contains('active')) {
                btn.classList.remove('active');
                await client
                    .from('cp_avoids')
                    .delete()
                    .eq('cp_id', cpId)
                    .eq('device_id', deviceId)
                    .eq('avoid_tag', tag);
                showToast('已取消 "' + tag + '" 雷区');
            } else {
                btn.classList.add('active');
                await client
                    .from('cp_avoids')
                    .insert({
                        cp_id: cpId,
                        user_id: user.id,
                        device_id: deviceId,
                        avoid_tag: tag
                    });
                showToast('已添加 "' + tag + '" 雷区 🚫');
            }

            updateAvoidDisplay(cpId);
        }

        async function updateStyleDisplay(cpId) {
            try {
                var client = getClient();
                var { data, error } = await client
                    .from('cp_styles')
                    .select('style_tag')
                    .eq('cp_id', cpId);

                if (error) throw error;

                var tags = data ? data.map(function(s) { return s.style_tag; }) : [];
                var el = document.getElementById('styleResult');
                if (tags.length > 0) {
                    el.textContent = '当前 ' + tags.length + ' 人选择：' + tags.join('、');
                } else {
                    el.textContent = '还没有人选择风格，快来定义吧 🎨';
                }
            } catch (err) {
                console.warn('更新风格显示失败:', err);
            }
        }

        async function updateAvoidDisplay(cpId) {
            try {
                var client = getClient();
                var { data, error } = await client
                    .from('cp_avoids')
                    .select('avoid_tag')
                    .eq('cp_id', cpId);

                if (error) throw error;

                var tags = data ? data.map(function(a) { return a.avoid_tag; }) : [];
                var el = document.getElementById('avoidResult');
                if (tags.length > 0) {
                    el.textContent = '🚫 已避雷：' + tags.join('、');
                } else {
                    el.textContent = '还没有人避雷，快来提醒大家 🚫';
                }
            } catch (err) {
                console.warn('更新雷区显示失败:', err);
            }
        }

        // ============================================================
        // 吐槽区函数
        // ============================================================
        async function loadComplaints(cpId) {
            try {
                var client = getClient();
                var { data, error } = await client
                    .from('complaints')
                    .select('id, user_id, device_id, content, flower_count, egg_count, created_at')
                    .eq('cp_id', cpId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                var container = document.getElementById('complaintList');

                if (!data || data.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:20px 0;font-size:14px;">还没有吐槽，快来成为第一个 🥚</div>';
                    return;
                }

                var html = '';
                data.forEach(function(c) {
                    var isMine = c.device_id === myDeviceId;
                    html += `
                        <div class="complaint-item" data-id="${c.id}">
                            <div class="complaint-content">“${escapeHtml(c.content)}”</div>
                            <div class="complaint-actions">
                                <button class="flower-btn" data-id="${c.id}">🌹 共鸣 ${c.flower_count || 0}</button>
                                <button class="egg-btn" data-id="${c.id}">🥚 反对 ${c.egg_count || 0}</button>
                                ${isMine ? `<button class="delete-btn" data-id="${c.id}" style="color:#ef4444;">🗑️ 删除</button>` : ''}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

                container.querySelectorAll('.flower-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var id = parseInt(this.getAttribute('data-id'));
                        handleComplaintReaction(id, 'flower');
                    });
                });

                container.querySelectorAll('.egg-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var id = parseInt(this.getAttribute('data-id'));
                        handleComplaintReaction(id, 'egg');
                    });
                });

                container.querySelectorAll('.delete-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var id = parseInt(this.getAttribute('data-id'));
                        if (confirm('确定要删除这条吐槽吗？')) {
                            deleteComplaint(id, cpId);
                        }
                    });
                });

            } catch (err) {
                console.warn('加载吐槽失败:', err);
            }
        }

        async function handleSubmitComplaint(cpId) {
            var user = getCurrentUser();
            if (!user) {
                showToast('请先登录 🚀');
                window.location.href = 'login.html';
                return;
            }

            var input = document.getElementById('complaintInput');
            var content = input.value.trim();

            if (!content) {
                showToast('写点什么再发射 🥚');
                return;
            }

            try {
                var client = getClient();
                var { error } = await client
                    .from('complaints')
                    .insert({
                        cp_id: cpId,
                        user_id: user.id,
                        device_id: user.id,
                        content: content
                    });

                if (error) throw error;

                showToast('🥚 吐槽发射成功！');
                input.value = '';
                loadComplaints(cpId);

                await trackActivity('complaint_submit', String(cpId), 'cp', {
                    content_length: content.length
                });

            } catch (err) {
                console.error('提交吐槽失败:', err);
                showToast('发射失败，请重试');
            }
        }

        async function handleComplaintReaction(complaintId, type) {
            var user = getCurrentUser();
            if (!user) {
                showToast('请先登录 🚀');
                window.location.href = 'login.html';
                return;
            }

            try {
                var client = getClient();

                var { data: existing } = await client
                    .from('complaint_reactions')
                    .select('id')
                    .eq('complaint_id', complaintId)
                    .eq('device_id', user.id)
                    .maybeSingle();

                if (existing) {
                    showToast(type === 'flower' ? '你已经共鸣过了 🌹' : '你已经反对过了 🥚');
                    return;
                }

                var { error } = await client
                    .from('complaint_reactions')
                    .insert({
                        complaint_id: complaintId,
                        user_id: user.id,
                        device_id: user.id,
                        reaction_type: type
                    });

                if (error) throw error;

                var field = type === 'flower' ? 'flower_count' : 'egg_count';
                var { data: complaint } = await client
                    .from('complaints')
                    .select(field)
                    .eq('id', complaintId)
                    .single();

                var newCount = (complaint ? complaint[field] : 0) + 1;
                await client
                    .from('complaints')
                    .update({ [field]: newCount })
                    .eq('id', complaintId);

                showToast(type === 'flower' ? '🌹 共鸣 +1' : '🥚 反对 +1');
                loadComplaints(cpId);

            } catch (err) {
                console.error('互动失败:', err);
                showToast('操作失败，请重试');
            }
        }

        async function deleteComplaint(complaintId, cpId) {
            try {
                var client = getClient();
                var { error } = await client
                    .from('complaints')
                    .delete()
                    .eq('id', complaintId);

                if (error) throw error;

                showToast('已删除 🗑️');
                loadComplaints(cpId);

            } catch (err) {
                console.error('删除失败:', err);
                showToast('删除失败，请重试');
            }
        }

        // ============================================================
        // 辅助函数：展开/折叠模块
        // ============================================================
        function toggleCreationModule(moduleId) {
            var el = document.getElementById(moduleId);
            if (el) {
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
        }

        // ============================================================
        // 辅助函数：切换风格标签
        // ============================================================
        function toggleStyleTag(tag) {
            var idx = selectedStyleTags.indexOf(tag);
            if (idx > -1) {
                selectedStyleTags.splice(idx, 1);
            } else {
                selectedStyleTags.push(tag);
            }
            document.querySelectorAll('.style-tag-btn').forEach(function(btn) {
                if (btn.dataset.tag === tag) {
                    btn.classList.toggle('active');
                }
            });
        }

        // ============================================================
        // 保存各模块
        // ============================================================
        async function saveRoleModule(cpId) {
            var roleName = document.getElementById('roleName')?.value.trim() || '';
            var roleType = document.getElementById('roleType')?.value || '';
            var roleLine = document.getElementById('roleLine')?.value.trim() || '';

            if (!roleName) {
                showToast('请填写角色名 🎭');
                return;
            }

            var success = await saveRoleSetting(cpId, {
                roleName: roleName,
                roleType: roleType,
                roleLine: roleLine,
                appearance: '',
                avatarUrl: ''
            });

            if (success) {
                location.reload();
            }
        }

        async function saveStoryModule(cpId) {
            var inputs = document.querySelectorAll('.scene-input');
            var scenes = [];
            inputs.forEach(function(input) {
                var val = input.value.trim();
                if (val) scenes.push(val);
            });

            if (scenes.length === 0) {
                showToast('请至少写一个场景 📝');
                return;
            }

            var success = await saveStoryScenes(cpId, scenes);
            if (success) {
                location.reload();
            }
        }

        async function saveStyleModule(cpId) {
            var styleTags = selectedStyleTags.length > 0 ? selectedStyleTags : [];
            var colorTone = document.getElementById('colorTone')?.value || '';
            var sceneStyle = document.getElementById('sceneStyle')?.value || '';

            if (styleTags.length === 0) {
                showToast('请至少选择一个风格标签 🎨');
                return;
            }

            var success = await saveVisualStyle(cpId, {
                styleTags: styleTags,
                colorTone: colorTone,
                sceneStyle: sceneStyle
            });

            if (success) {
                location.reload();
            }
        }

        // ============================================================
        // 🆕 星探功能
        // ============================================================
        async function loadStarNominations(cpId) {
            try {
                var client = getClient();
                var { data, error } = await client
                    .from('actor_nominations')
                    .select('actor_name, nomination_count')
                    .eq('cp_id', cpId)
                    .order('nomination_count', { ascending: false })
                    .limit(5);

                var list = document.getElementById('starNominationsList');
                if (!list) return;

                if (error || !data || data.length === 0) {
                    list.innerHTML = '<span style="color:#9ca3af;">暂无推荐，快来提名你心中的演员 ⭐</span>';
                    return;
                }

                var html = '';
                data.forEach(function(item) {
                    html += `<span class="nomination-tag">${escapeHtml(item.actor_name)} ⭐ ${item.nomination_count}人推荐</span>`;
                });
                list.innerHTML = html;

            } catch (err) {
                console.warn('加载推荐列表失败:', err);
                var list = document.getElementById('starNominationsList');
                if (list) {
                    list.innerHTML = '<span style="color:#9ca3af;">加载失败，请刷新</span>';
                }
            }
        }

        async function submitStarNomination(cpId) {
            var user = getCurrentUser();
            if (!user) {
                showToast('请先登录 🚀');
                window.location.href = 'login.html';
                return;
            }

            var actorName = document.getElementById('starActorInput').value.trim();
            if (!actorName) {
                showToast('请输入演员名字 ⭐');
                return;
            }

            try {
                var client = getClient();

                var { data: cp } = await client
                    .from('cp_submissions')
                    .select('male_actor, female_actor, genre')
                    .eq('id', cpId)
                    .single();

                if (!cp) {
                    showToast('CP 不存在');
                    return;
                }

                // 检查是否已推荐过
                var { data: existing } = await client
                    .from('actor_nominations')
                    .select('id')
                    .eq('actor_name', actorName)
                    .eq('cp_id', cpId)
                    .eq('nominated_by', user.id)
                    .maybeSingle();

                if (existing) {
                    showToast('你已经推荐过这位演员了 ⭐');
                    return;
                }

                var { error } = await client
                    .from('actor_nominations')
                    .insert({
                        actor_name: actorName,
                        cp_id: cpId,
                        nominated_by: user.id,
                        nomination_reason: `推荐 ${actorName} 出演 ${cp.male_actor} ✕ ${cp.female_actor} 的 CP 组合`,
                        nomination_count: 1
                    });

                if (error) throw error;

                showToast(`⭐ 已推荐 ${actorName}！`);
                document.getElementById('starActorInput').value = '';
                loadStarNominations(cpId);

                await trackActivity('star_nomination', String(cpId), 'cp', {
                    actor_name: actorName
                });

            } catch (err) {
                console.error('推荐失败:', err);
                showToast('推荐失败，请重试');
            }
        }

        // ============================================================
        // 加载创作数据（从 creation.js 调用）
        // ============================================================
        async function loadCreationData(cpId) {
            var user = getCurrentUser();
            if (!user) {
                showToast('请先登录 🚀');
                window.location.href = 'login.html';
                return null;
            }

            var creation = await getUserCreation(user.id, cpId);
            var progress = await getCreationProgress(user.id, cpId);

            return { creation, progress, user };
        }

        console.log('✅ 捣蛋选角 - CP详情页已加载 (2.0)');
    </script>
