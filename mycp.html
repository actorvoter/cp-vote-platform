<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CP 详情 · 捣蛋选角</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .cp-summary {
            background: #f8f6ff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .cp-summary .cp-title {
            font-size: 20px;
            font-weight: 600;
        }
        .cp-summary .cp-meta {
            margin-top: 8px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #6b7280;
        }
        .cp-summary .cp-meta .genre-tag {
            background: #ede9fe;
            color: #6c5ce7;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .cp-summary .cp-meta .status-tag {
            color: #9ca3af;
        }
        .comment-item {
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
            position: relative;
        }
        .comment-item .comment-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .comment-item .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }
        .comment-item .comment-nickname {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .comment-item .comment-nickname .guest-tag {
            font-size: 11px;
            font-weight: 400;
            color: #9ca3af;
            margin-left: 4px;
        }
        .comment-item .comment-time {
            font-size: 11px;
            color: #9ca3af;
            margin-left: auto;
        }
        .comment-item .comment-content {
            font-size: 14px;
            color: #374151;
            margin-top: 4px;
            padding-left: 36px;
            word-break: break-word;
        }
        .comment-item .comment-actions {
            padding-left: 36px;
            margin-top: 4px;
            display: flex;
            gap: 12px;
        }
        .comment-item .comment-actions button {
            background: none;
            border: none;
            font-size: 12px;
            color: #9ca3af;
            cursor: pointer;
            padding: 2px 0;
        }
        .comment-item .comment-actions button:hover {
            color: #6c5ce7;
        }
        .comment-item .replies {
            margin-left: 36px;
            padding-left: 12px;
            border-left: 2px solid #ede9fe;
            margin-top: 8px;
        }
        .comment-item .replies .reply-item {
            padding: 8px 0;
            border-bottom: 1px solid #f9f8ff;
        }
        .comment-item .replies .reply-item:last-child {
            border-bottom: none;
        }
        .reply-input-area {
            display: flex;
            gap: 8px;
            padding-left: 36px;
            margin-top: 6px;
        }
        .reply-input-area input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
        }
        .reply-input-area input:focus {
            border-color: #6c5ce7;
        }
        .reply-input-area button {
            background: #6c5ce7;
            color: #fff;
            border: none;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }
        .comment-empty {
            text-align: center;
            color: #9ca3af;
            padding: 30px 0;
            font-size: 14px;
        }
        .comment-input-area {
            position: sticky;
            bottom: 0;
            background: #fff;
            border-top: 1px solid #ede9fe;
            padding: 12px 0;
            margin-top: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .comment-input-area .user-badge {
            font-size: 13px;
            color: #6c5ce7;
            font-weight: 500;
            white-space: nowrap;
            padding: 4px 12px;
            background: #ede9fe;
            border-radius: 20px;
        }
        .comment-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }
        .comment-input-area input:focus {
            border-color: #6c5ce7;
        }
        .comment-input-area .send-btn {
            background: #6c5ce7;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .comment-input-area .send-btn:active {
            transform: scale(0.95);
        }
        .error-state {
            text-align: center;
            color: #ef4444;
            padding: 40px 20px;
            font-size: 16px;
        }
        .loading-state {
            text-align: center;
            color: #9ca3af;
            padding: 40px 0;
        }
        .avatar-color-0 {
            background: #6c5ce7;
        }
        .avatar-color-1 {
            background: #e74c3c;
        }
        .avatar-color-2 {
            background: #2ecc71;
        }
        .avatar-color-3 {
            background: #f39c12;
        }
        .avatar-color-4 {
            background: #3498db;
        }
        .avatar-color-5 {
            background: #1abc9c;
        }
        .avatar-color-6 {
            background: #e67e22;
        }
        .avatar-color-7 {
            background: #9b59b6;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="detailTitle">💬 CP 讨论</h1>
        <a href="javascript:history.back()" class="btn-secondary">← 返回</a>
    </div>

    <div id="detailBody">
        <div class="loading-state">加载中...</div>
    </div>

    <div class="comment-input-area" id="commentInputArea" style="display:none;">
        <span class="user-badge" id="userBadge">👤 游客</span>
        <input type="text" id="commentContent" placeholder="写评论..." style="flex:1;" />
        <button class="send-btn" id="sendCommentBtn">发送</button>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/supabase.js">
    </script>
    <script>
        function showToast(msg) {
            var t = document.getElementById('toast');
            if (!t) { alert(msg); return; }
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._hideTimer);
            t._hideTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(iso) {
            if (!iso) return '';
            var d = new Date(iso);
            return d.getMonth() + 1 + '/' + d.getDate() + ' ' +
                String(d.getHours()).padStart(2, '0') + ':' +
                String(d.getMinutes()).padStart(2, '0');
        }

        function getAvatarColor(seed) {
            var colors = ['avatar-color-0', 'avatar-color-1', 'avatar-color-2', 'avatar-color-3',
                'avatar-color-4', 'avatar-color-5', 'avatar-color-6', 'avatar-color-7'
            ];
            var hash = 0;
            for (var i = 0; i < seed.length; i++) {
                hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function getInitials(name) {
            if (!name) return '?';
            return name.substr(0, 1).toUpperCase();
        }

        function getCpIdFromUrl() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (id && !isNaN(id)) return parseInt(id);

            var pathParts = window.location.pathname.split('/');
            for (var i = pathParts.length - 1; i >= 0; i--) {
                if (pathParts[i] && !isNaN(pathParts[i])) {
                    return parseInt(pathParts[i]);
                }
            }
            return null;
        }

        function getUserInfo() {
            var user = getCurrentUser();
            if (user) {
                return {
                    id: user.id,
                    email: user.email,
                    isGuest: false
                };
            }
            return {
                id: 'guest_' + Date.now(),
                email: null,
                isGuest: true
            };
        }

        async function getUserNickname(userId) {
            if (!userId || userId.startsWith('guest_')) return null;
            try {
                var client = getClient();
                var { data, error } = await client
                    .from('users')
                    .select('nickname')
                    .eq('id', userId)
                    .maybeSingle();
                if (error || !data) return null;
                return data.nickname;
            } catch (e) {
                return null;
            }
        }

        var myDeviceId = getDeviceId();
        var cpId = getCpIdFromUrl();
        var currentUser = getUserInfo();

        console.log('当前 CP ID:', cpId);

        var body = document.getElementById('detailBody');
        var commentArea = document.getElementById('commentInputArea');

        if (!cpId) {
            body.innerHTML = '<div class="error-state">❌ 参数错误，请从首页进入</div>';
            commentArea.style.display = 'none';
        } else {
            loadDetail(cpId);
        }

        async function loadDetail(cpId) {
            try {
                var client = getClient();

                var { data: cpData, error: cpError } = await client
                    .from('cp_submissions')
                    .select('id, male_actor, female_actor, genre, status, votes ( id )')
                    .eq('id', cpId)
                    .maybeSingle();

                if (cpError || !cpData) {
                    console.error('CP 不存在:', cpError);
                    body.innerHTML = '<div class="error-state">❌ CP 不存在或已被删除</div>';
                    commentArea.style.display = 'none';
                    return;
                }

                var voteCount = cpData.votes ? cpData.votes.length : 0;

                var { data: comments, error: commentError } = await client
                    .from('comments')
                    .select('id, user_id, nickname, content, created_at, device_id, parent_id')
                    .eq('submission_id', cpId)
                    .order('created_at', { ascending: false });

                if (commentError) {
                    console.warn('加载评论失败:', commentError);
                    comments = [];
                }

                var title = cpData.male_actor + ' ✕ ' + cpData.female_actor;
                document.getElementById('detailTitle').textContent = '💬 ' + title;

                updateUserBadge();

                var topComments = [];
                var replyMap = {};
                comments.forEach(function(c) {
                    if (c.parent_id) {
                        if (!replyMap[c.parent_id]) replyMap[c.parent_id] = [];
                        replyMap[c.parent_id].push(c);
                    } else {
                        topComments.push(c);
                    }
                });

                var commentHtml = '';
                if (topComments.length === 0) {
                    commentHtml = '<div class="comment-empty">还没有评论，来说点什么吧 💬</div>';
                } else {
                    topComments.forEach(function(c) {
                        commentHtml += renderComment(c, replyMap);
                    });
                }

                body.innerHTML = `
                        <div class="cp-summary">
                            <div class="cp-title">${escapeHtml(cpData.male_actor)} ✕ ${escapeHtml(cpData.female_actor)}</div>
                            <div class="cp-meta">
                                <span class="genre-tag">${escapeHtml(cpData.genre)}</span>
                                <span>❤️ ${voteCount} 票</span>
                                <span class="status-tag">${cpData.status === 'approved' ? '✅ 已上线' : '⏳ 审核中'}</span>
                            </div>
                        </div>
                        <div id="commentList">${commentHtml}</div>
                    `;

                commentArea.style.display = 'flex';

                document.getElementById('sendCommentBtn').onclick = function() { handleSendComment(cpId, null); };
                document.getElementById('commentContent').onkeydown = function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSendComment(cpId, null);
                    }
                };

                document.querySelectorAll('.reply-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var parentId = this.getAttribute('data-parent-id');
                        toggleReplyInput(parentId);
                    });
                });

                document.querySelectorAll('.reply-send-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var parentId = this.getAttribute('data-parent-id');
                        var input = document.getElementById('reply_input_' + parentId);
                        if (input) {
                            var content = input.value.trim();
                            if (content) {
                                handleSendComment(cpId, parseInt(parentId), content);
                            }
                        }
                    });
                });

            } catch (err) {
                console.error('加载详情失败:', err);
                body.innerHTML = '<div class="error-state">❌ 加载失败，请刷新重试</div>';
                commentArea.style.display = 'none';
            }
        }

        function renderComment(comment, replyMap) {
            var isGuest = !comment.user_id || comment.user_id.startsWith('guest_');
            var displayName = comment.nickname || (isGuest ? '游客' : '用户');
            var avatarSeed = comment.user_id || comment.nickname || 'guest';
            var avatarColor = getAvatarColor(avatarSeed);
            var initials = getInitials(displayName);
            var timeStr = formatTime(comment.created_at);

            var replies = replyMap[comment.id] || [];
            var replyHtml = '';
            if (replies.length > 0) {
                replyHtml = '<div class="replies">';
                replies.forEach(function(r) {
                    var rIsGuest = !r.user_id || r.user_id.startsWith('guest_');
                    var rName = r.nickname || (rIsGuest ? '游客' : '用户');
                    var rColor = getAvatarColor(r.user_id || r.nickname || 'guest');
                    var rInitials = getInitials(rName);
                    replyHtml += `
                            <div class="reply-item">
                                <div class="comment-header">
                                    <span class="comment-avatar ${rColor}">${rInitials}</span>
                                    <span class="comment-nickname">${escapeHtml(rName)}</span>
                                    <span class="comment-time">${formatTime(r.created_at)}</span>
                                </div>
                                <div class="comment-content">${escapeHtml(r.content)}</div>
                            </div>
                        `;
                });
                replyHtml += '</div>';
            }

            return `
                    <div class="comment-item" id="comment_${comment.id}">
                        <div class="comment-header">
                            <span class="comment-avatar ${avatarColor}">${initials}</span>
                            <span class="comment-nickname">${escapeHtml(displayName)}${isGuest ? ' <span class="guest-tag">🧳 游客</span>' : ''}</span>
                            <span class="comment-time">${timeStr}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                        <div class="comment-actions">
                            <button class="reply-btn" data-parent-id="${comment.id}">💬 回复</button>
                        </div>
                        ${replyHtml}
                        <div class="reply-input-area" id="reply_area_${comment.id}" style="display:none;">
                            <input type="text" id="reply_input_${comment.id}" placeholder="回复 ${escapeHtml(displayName)}..." style="flex:1;" />
                            <button class="reply-send-btn" data-parent-id="${comment.id}">发送</button>
                        </div>
                    </div>
                `;
        }

        function toggleReplyInput(parentId) {
            var area = document.getElementById('reply_area_' + parentId);
            if (area) {
                if (area.style.display === 'none' || area.style.display === '') {
                    area.style.display = 'flex';
                    var input = document.getElementById('reply_input_' + parentId);
                    if (input) input.focus();
                } else {
                    area.style.display = 'none';
                }
            }
        }

        function updateUserBadge() {
            var badge = document.getElementById('userBadge');
            if (!badge) return;
            var user = getCurrentUser();
            if (user) {
                getUserNickname(user.id).then(function(nickname) {
                    var display = nickname || user.email || '用户';
                    badge.textContent = '👤 ' + display;
                });
                badge.textContent = '👤 ' + (user.email || '用户');
            } else {
                badge.textContent = '🧳 游客';
            }
        }

        async function handleSendComment(cpId, parentId, prefillContent) {
            var contentInput = document.getElementById('commentContent');
            var content = prefillContent || contentInput.value.trim();

            if (!content) { showToast('请输入评论内容'); return; }

            var user = getCurrentUser();
            var isGuest = !user;

            var nickname = null;
            if (!isGuest) {
                try {
                    var client = getClient();
                    var { data } = await client
                        .from('users')
                        .select('nickname')
                        .eq('id', user.id)
                        .maybeSingle();
                    if (data && data.nickname) {
                        nickname = data.nickname;
                    } else {
                        nickname = user.email ? user.email.split('@')[0] : '用户';
                    }
                } catch (e) {
                    nickname = user.email ? user.email.split('@')[0] : '用户';
                }
            } else {
                nickname = '游客_' + Math.random().toString(36).substr(2, 4);
            }

            try {
                var client = getClient();
                var { error } = await client.from('comments').insert({
                    submission_id: cpId,
                    user_id: isGuest ? null : String(user.id),
                    device_id: isGuest ? myDeviceId : String(user.id),
                    nickname: nickname,
                    content: content,
                    parent_id: parentId || null
                });

                if (error) throw error;

                showToast(parentId ? '回复成功 ✅' : '评论发送成功 ✅');
                if (!prefillContent) {
                    contentInput.value = '';
                }
                loadDetail(cpId);

            } catch (err) {
                console.error('发送失败:', err);
                showToast('发送失败，请重试');
            }
        }

        console.log('✅ 捣蛋选角 - CP详情页已加载');
    </script>
</body>
</html>
