<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>登录 · CP 热力榜</title>
    <!-- ✅ 替换为 jsdelivr CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .login-container { max-width:400px; margin:60px auto 0; padding:0 20px; }
        .login-container h2 { text-align:center; margin-bottom:8px; font-size:24px; }
        .login-container .subtitle { text-align:center; color:#9ca3af; font-size:14px; margin-bottom:30px; }
        .login-container .code-row { display:flex; gap:10px; }
        .login-container .code-row input { flex:1; }
        .login-container .code-row .btn-secondary { white-space:nowrap; padding:14px 16px; border-radius:12px; font-size:14px; }
        .login-container .btn-primary { width:100%; padding:14px; font-size:16px; border-radius:12px; margin-top:8px; }
        .login-container .back-link { display:block; text-align:center; margin-top:20px; color:#9ca3af; font-size:14px; }
        .login-container .back-link a { color:#6c5ce7; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>📧 邮箱登录</h2>
        <p class="subtitle">登录后可以评论、使用道具、管理你的 CP</p>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="emailInput" placeholder="请输入邮箱" />
        </div>
        <div class="form-group">
            <label>验证码</label>
            <div class="code-row">
                <input type="text" id="codeInput" placeholder="请输入验证码" maxlength="8" />
                <button class="btn-secondary" id="sendCodeBtn">获取验证码</button>
            </div>
        </div>
        <button class="btn-primary" id="loginBtn">登录 / 注册</button>
        <p class="back-link"><a href="index.html">← 返回首页</a></p>
    </div>
    <div class="toast" id="toast"></div>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        var countdown = 0;
        var countdownTimer = null;

        document.getElementById('sendCodeBtn').addEventListener('click', async function() {
            var email = document.getElementById('emailInput').value.trim();
            if (!email || !email.includes('@')) {
                showToast('请输入正确的邮箱');
                return;
            }

            var success = await sendVerificationCode(email);
            if (success) {
                countdown = 60;
                this.disabled = true;
                this.textContent = countdown + 's';
                clearInterval(countdownTimer);
                countdownTimer = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(countdownTimer);
                        document.getElementById('sendCodeBtn').disabled = false;
                        document.getElementById('sendCodeBtn').textContent = '获取验证码';
                    } else {
                        document.getElementById('sendCodeBtn').textContent = countdown + 's';
                    }
                }, 1000);
            }
        });

        document.getElementById('loginBtn').addEventListener('click', async function() {
            var email = document.getElementById('emailInput').value.trim();
            var code = document.getElementById('codeInput').value.trim();

            if (!email || !email.includes('@')) {
                showToast('请输入正确的邮箱');
                return;
            }
            if (!code || code.length < 4) {
                showToast('请输入验证码');
                return;
            }

            this.disabled = true;
            this.textContent = '登录中...';

            var success = await verifyAndLogin(email, code);

            this.disabled = false;
            this.textContent = '登录 / 注册';

            if (success) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('codeInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
